---
# Source: flask-aws-monitor/templates/service.yaml
apiVersion: v1
kind: Service

metadata:
  name: flask-prd-flask-aws-monitor
  labels:
    helm.sh/chart: flask-aws-monitor-0.1.0
    app.kubernetes.io/name: flask-aws-monitor
    app.kubernetes.io/instance: flask-prd
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm

spec:
  type: LoadBalancer

  selector:
    app.kubernetes.io/name: flask-aws-monitor
    app.kubernetes.io/instance: flask-prd

  ports:
    - protocol: TCP
      port: 5001
      targetPort: http
---
# Source: flask-aws-monitor/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-prd-flask-aws-monitor
  labels:
    helm.sh/chart: flask-aws-monitor-0.1.0
    app.kubernetes.io/name: flask-aws-monitor
    app.kubernetes.io/instance: flask-prd
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm

spec:
  replicas: 3

  selector:
    matchLabels:
      app.kubernetes.io/name: flask-aws-monitor
      app.kubernetes.io/instance: flask-prd

  template:
    metadata:
      labels:
        app.kubernetes.io/name: flask-aws-monitor
        app.kubernetes.io/instance: flask-prd

    spec:
      containers:
        - name: flask-aws-monitor

          image: "miky97/flask-aws-monitor:2"

          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 5001

          env:
            - name: AWS_ACCESS_KEY_ID
              value: ""

            - name: AWS_SECRET_ACCESS_KEY
              value: ""

          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 200m
              memory: 256Mi
---
# Source: flask-aws-monitor/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flask-prd-flask-aws-monitor
  labels:
    helm.sh/chart: flask-aws-monitor-0.1.0
    app.kubernetes.io/name: flask-aws-monitor
    app.kubernetes.io/instance: flask-prd
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  rules:
    - host: "flask-monitor.prd.local"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flask-prd-flask-aws-monitor
                port:
                  number: 5001
